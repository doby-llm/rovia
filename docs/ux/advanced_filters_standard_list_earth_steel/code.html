<script>
        // Micro-interactions for chips
        document.querySelectorAll('button[class*="rounded-full"]').forEach(button => {
            button.addEventListener('click', function() {
                if (!this.closest('nav')) {
                    // Logic for multi-select chips
                    if (this.classList.contains('bg-primary')) {
                        this.classList.remove('bg-primary', 'text-on-primary');
                        this.classList.add('text-on-surface-variant', 'hover:bg-surface-container-high');
                    } else {
                        this.classList.add('bg-primary', 'text-on-primary');
                        this.classList.remove('text-on-surface-variant', 'hover:bg-surface-container-high');
                    }
                }
            });
        });
    </script>
