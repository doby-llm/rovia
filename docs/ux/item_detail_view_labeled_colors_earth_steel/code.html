<script>
        // Micro-interaction for Favorite Toggle
        const favoriteBtn = document.getElementById('favorite-btn');
        const favoriteIcon = document.getElementById('favorite-icon');
        let isFavorited = false;

        favoriteBtn.addEventListener('click', () => {
            isFavorited = !isFavorited;
            
            // Animation class
            favoriteIcon.style.transform = 'scale(0.8)';
            setTimeout(() => {
                favoriteIcon.style.transform = 'scale(1.2)';
                if (isFavorited) {
                    favoriteIcon.style.fontVariationSettings = "'FILL' 1";
                    favoriteIcon.classList.add('text-secondary');
                    favoriteIcon.classList.remove('text-primary');
                } else {
                    favoriteIcon.style.fontVariationSettings = "'FILL' 0";
                    favoriteIcon.classList.remove('text-secondary');
                    favoriteIcon.classList.add('text-primary');
                }
                setTimeout(() => {
                    favoriteIcon.style.transform = 'scale(1)';
                }, 150);
            }, 100);
            
            // Basic transition
            favoriteIcon.style.transition = 'transform 0.15s ease-in-out, color 0.15s ease';
        });
    </script>
